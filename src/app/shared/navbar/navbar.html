<nav class="nav" aria-label="Primary">
  <div class="nav__inner sr-container">
    <a
      class="brand brand--mobile"
      routerLink="/"
      (click)="closeMenu()"
      aria-label="Scramble Roulette play"
    >
      <span class="brand__mark" aria-hidden="true">
        <span class="brand__mark-inner">SR</span>
      </span>
      <span class="brand__name">Scramble Roulette</span>
    </a>

    <a
      class="brand brand--desktop"
      routerLink="/"
      (click)="closeMenu()"
      aria-label="Scramble Roulette home"
    >
      <span class="brand__mark" aria-hidden="true">
        <span class="brand__mark-inner">SR</span>
      </span>
      <span class="brand__name">Scramble Roulette</span>
    </a>

    <button
      type="button"
      class="nav__toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="nav-menu"
      aria-label="Toggle navigation menu"
      (click)="toggleMenu()"
    >
      <span class="nav__toggle-bar" [class.is-open]="menuOpen()"></span>
    </button>

    <div id="nav-menu" class="nav__menu" [class.is-open]="menuOpen()">
      <ul class="nav__links">
        @for (link of links; track link.path) {
          <li>
            <a
              [routerLink]="link.path"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: link.path === '/' }"
              class="nav__link"
              (click)="closeMenu()"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>

      <div class="nav__actions">
        <button
          type="button"
          class="nav__sound-btn"
          [attr.aria-pressed]="muted()"
          [attr.aria-label]="muted() ? 'Unmute sound effects' : 'Mute sound effects'"
          (click)="toggleMute()"
        >
          @if (muted()) {
            <svg class="nav__sound-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"
              />
            </svg>
          } @else {
            <svg class="nav__sound-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
              />
            </svg>
          }
        </button>
        <a routerLink="/" class="sr-btn sr-btn--gold nav__cta" (click)="closeMenu()">
          New Round
        </a>
      </div>
    </div>

    <button
      type="button"
      class="nav__sound-btn nav__sound-btn--mobile"
      [attr.aria-pressed]="muted()"
      [attr.aria-label]="muted() ? 'Unmute sound effects' : 'Mute sound effects'"
      (click)="toggleMute()"
    >
      @if (muted()) {
        <svg class="nav__sound-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"
          />
        </svg>
      } @else {
        <svg class="nav__sound-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
          />
        </svg>
      }
    </button>
  </div>
</nav>
