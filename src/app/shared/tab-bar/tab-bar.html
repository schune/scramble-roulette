<nav class="tab-bar" aria-label="App navigation">
  @for (tab of tabs; track tab.path) {
    <a
      class="tab-bar__item"
      [class.tab-bar__item--primary]="tab.primary"
      [routerLink]="tab.path"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: tab.path === '/' }"
    >
      <span class="tab-bar__icon" aria-hidden="true">{{ tab.icon }}</span>
      <span class="tab-bar__label">{{ tab.label }}</span>
    </a>
  }
</nav>
